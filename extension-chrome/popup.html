<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font: 13px/1.5 system-ui, sans-serif;
      margin: 0;
      padding: 14px 16px;
      background: #f8f8f8;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    .header h2 {
      margin: 0;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header img { width: 22px; height: 22px; }
    .section {
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-subtitle {
      font-size: 10px;
      color: #888;
      font-weight: 400;
    }
    .section-hint {
      display: block;
      font-size: 10px;
      color: #555;
      font-weight: 400;
      margin-top: 2px;
      font-style: italic;
    }
    .mode-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      margin-right: 2px;
      vertical-align: -3px;
    }
    .zoom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .zoom-row label {
      font-size: 11px;
      color: #666;
      min-width: 36px;
    }
    .zoom-row select {
      flex: 1;
      padding: 3px 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .activate-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 5px 0;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 600;
    }
    .activate-btn:hover { background: #1557b0; }
    .activate-btn.deactivate {
      background: #dc2626;
    }
    .activate-btn.deactivate:hover { background: #b91c1c; }
    .shortcut {
      margin-top: 10px;
      padding: 6px 10px;
      background: #e8f4fd;
      border-radius: 6px;
      font-size: 10px;
      color: #1e5a8a;
      line-height: 1.6;
    }
    kbd {
      background: #ddd;
      border: 1px solid #bbb;
      border-radius: 2px;
      padding: 0 3px;
      font-size: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2><img src="icon-both.png" alt=""> Loupe Zoom</h2>
  </div>

  <div class="section">
    <div class="section-title">
      <span><span class="mode-icon">🔎</span>Loupe souris</span>
      <span class="section-subtitle">Facile+</span>
    </div>
    <span class="section-hint">Ctrl+molette pour changer le zoom</span>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="mouse-zoom"></select>
    </div>
    <button class="activate-btn" id="activate-mouse">Activer la Loupe souris</button>
  </div>

  <div class="section">
    <div class="section-title">
      <span><span class="mode-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M6 13h.01M18 13h.01M7 17h10"/></svg>
      </span>Focus-loupe</span>
      <span class="section-subtitle">Vision+</span>
    </div>
    <span class="section-hint">Tabulation pour avancer et +/− pour changer le zoom</span>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="focus-zoom"></select>
    </div>
    <button class="activate-btn" id="activate-focus">Activer le Focus-loupe</button>
  </div>

  <div class="section">
    <div class="section-title">
      <span><span class="mode-icon" aria-hidden="true">
        <svg width="20" height="16" viewBox="0 0 28 20" fill="none" stroke="#111" stroke-width="2"><rect x="1.5" y="1.5" width="25" height="17" rx="3.5"/><text x="14" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#111" stroke="none">A</text></svg>
      </span>Agrandisseur</span>
      <span class="section-subtitle">Vision++</span>
    </div>
    <span class="section-hint">Flèches pour naviguer</span>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="magnifier-zoom"></select>
    </div>
    <button class="activate-btn" id="activate-magnifier">Activer l'Agrandisseur</button>
  </div>

  <div class="shortcut">
    <kbd>Ctrl</kbd>+<kbd>Maj</kbd>+<kbd>Z</kbd> Activer/Désactiver<br>
    <kbd>Entrée</kbd> Afficher la loupe · <kbd>Échap.</kbd> Masquer
  </div>

  <script src="popup.js"></script>
</body>
</html>
