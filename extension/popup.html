<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font: 14px/1.5 system-ui, sans-serif;
      padding: 12px 16px;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #fff;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #aaa;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #16213e;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .saved {
      color: #4ade80;
      font-size: 12px;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h3>🔍 Loupe Zoom</h3>
  <label for="default-zoom">Zoom par défaut</label>
  <select id="default-zoom"></select>
  <div class="saved" id="saved-msg">✓ Enregistré</div>
  <script src="popup.js"></script>
</body>
</html>
