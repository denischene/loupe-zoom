<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font: 13px/1.5 system-ui, sans-serif;
      margin: 0;
      padding: 14px 16px;
      background: #f8f8f8;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    .header h2 {
      margin: 0;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header img { width: 22px; height: 22px; }
    .toggle-btn {
      padding: 4px 12px;
      border-radius: 14px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-btn.off {
      background: #e0e0e0;
      color: #666;
    }
    .toggle-btn.on {
      background: #16a34a;
      color: #fff;
    }
    .section {
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-subtitle {
      font-size: 10px;
      color: #888;
      font-weight: 400;
    }
    .zoom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .zoom-row label {
      font-size: 11px;
      color: #666;
      min-width: 36px;
    }
    .zoom-row select {
      flex: 1;
      padding: 3px 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    .shortcut {
      margin-top: 10px;
      padding: 6px 10px;
      background: #e8f4fd;
      border-radius: 6px;
      font-size: 10px;
      color: #1e5a8a;
      line-height: 1.6;
    }
    kbd {
      background: #ddd;
      border: 1px solid #bbb;
      border-radius: 2px;
      padding: 0 3px;
      font-size: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2><img src="icon-both.png" alt=""> Loupe Zoom</h2>
    <button class="toggle-btn off" id="toggle">Désactivé</button>
  </div>

  <div class="section">
    <div class="section-title">
      🖱️ Loupe souris
      <span class="section-subtitle">Facile+</span>
    </div>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="mouse-zoom"></select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      ⌨️ Focus-loupe
      <span class="section-subtitle">Vision+</span>
    </div>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="focus-zoom"></select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      🔎 Agrandisseur
      <span class="section-subtitle">Vision++</span>
    </div>
    <div class="zoom-row">
      <label>Zoom</label>
      <select id="magnifier-zoom"></select>
    </div>
  </div>

  <div class="shortcut">
    <kbd>Ctrl</kbd>+<kbd>Maj</kbd>+<kbd>Z</kbd> Activer/Désactiver<br>
    <kbd>Entrée</kbd> Afficher la loupe · <kbd>Échap.</kbd> Masquer
  </div>

  <script src="popup.js"></script>
</body>
</html>
