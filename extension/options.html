<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font: 14px/1.6 system-ui, sans-serif;
      padding: 24px 32px;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      max-width: 400px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      color: #111;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #666;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
      font-size: 14px;
      cursor: pointer;
    }
    .saved {
      color: #16a34a;
      font-size: 13px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .info {
      margin-top: 20px;
      padding: 12px;
      background: #e8f4fd;
      border-radius: 8px;
      font-size: 12px;
      color: #1e5a8a;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>🔍 Loupe Zoom — Réglages</h2>
  <label for="default-zoom">Zoom par défaut</label>
  <select id="default-zoom"></select>
  <div class="saved" id="saved-msg">✓ Enregistré</div>
  <div class="info">
    Pour modifier le raccourci clavier, allez dans<br>
    <strong>about:addons → ⚙️ → Gérer les raccourcis d'extension</strong>
  </div>
  <script src="options.js"></script>
</body>
</html>
